spring.application.name=song

# Database Configuration using Environment Variables with local fallbacks
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/db_song}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server Port
server.port=${PORT:8080}